services:
  backend-api:
    build: ./apps/backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MILVUS_HOST=vector-db
      - MILVUS_PORT=19530
      - WAHA_BASE_URL=${WAHA_BASE_URL:-}
      - WAHA_SESSION=${WAHA_SESSION:-default}
      - WAHA_API_KEY=${WAHA_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OWNER_WHATSAPP_NUMBER=${OWNER_WHATSAPP_NUMBER:-}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-cahbot_db}

    volumes:
      - ./apps/backend/app:/app/app
      - ./apps/backend/main.py:/app/main.py
      - ./apps/backend/alembic:/app/alembic
      - ./apps/backend/alembic.ini:/app/alembic.ini
    depends_on:
      vector-db:
        condition: service_healthy
      postgres:
        condition: service_healthy
      # waha:
      #   condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-cahbot_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  vector-db:
    image: milvusdb/milvus:v2.4.1
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    command: [ "milvus", "run", "standalone" ]
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/healthz" ]
      interval: 10s
      timeout: 10s
      retries: 5
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  waha:
    image: devlikeapro/waha
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./.sessions:/app/.sessions
    # dns:
    #   - 1.1.1.1
    #   - 8.8.8.8
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"
    ports:
      - "8001:3000"

volumes:
  milvus_data:
  etcd_data:
  minio_data:
  postgres_data:

